services:
  minio:
    image: minio/minio:latest
    container_name: hilo-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: hilo_test
      MINIO_ROOT_PASSWORD: hilo_test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - minio-data:/data

volumes:
  minio-data:
